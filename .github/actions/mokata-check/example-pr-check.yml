# Example: opt your team's repo into the mokata PR check.
# Copy this to `.github/workflows/mokata-pr-check.yml` in YOUR repo. It is least-privilege
# (read the code; write only PR comments) and degrade-clean (it never false-blocks a PR when
# there's nothing for mokata to check). This file lives under .github/actions/ on purpose so it
# does NOT run in the mokata repo itself — it's a template to copy.

name: mokata PR check

on:
  pull_request:

# Least-privilege: read the repository, and write only pull-request comments (to post the review).
permissions:
  contents: read
  pull-requests: write

jobs:
  mokata-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the base diff resolves

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install mokata (from PyPI once published; or `pip install -e .` from a clone / submodule).
      - name: Install mokata
        run: python -m pip install --quiet mokata

      # Run the completeness gate + spec-awareness over the PR's changed files.
      # `fail-on-block: true` makes a real block fail the check (set false for report-only).
      - id: check
        uses: JasGujral/mokata-oss/.github/actions/mokata-check@v0.0.5
        with:
          base: ${{ github.event.pull_request.base.sha }}
          fail-on-block: "true"

      # mokata only PRODUCES the comment; the repo's own GITHUB_TOKEN posts it (the standard CI
      # pattern — mokata never acts on your behalf outside your CI). `always()` posts the result
      # even when the check blocked.
      - name: Post the mokata review comment
        if: always() && hashFiles(steps.check.outputs.comment-file) != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file "${{ steps.check.outputs.comment-file }}"
