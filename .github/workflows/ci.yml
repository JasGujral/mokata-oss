name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Least-privilege default: read-only workspace-wide; each job re-declares the minimum it needs.
permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }} · jsonschema=${{ matrix.jsonschema }}
    # Stage 66 — cross-platform parity: the unit + integration suite runs on Windows, macOS,
    # and Linux (× the existing Python / jsonschema axes). Least-privilege; mirrors the prior
    # Linux job. The live-db job below stays Linux-only (its services are Linux containers).
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    # Every `run:` step uses bash on all three OSes — windows-latest defaults to pwsh, which
    # would break the `mktemp -d` / `|| true` POSIX steps. windows-latest ships Git Bash.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        python: ["3.9", "3.10", "3.11", "3.12"]
        jsonschema: ["absent", "present"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install mokata
        run: pip install -e .
      - name: Install workflow-lint test tooling (PyYAML — a test-only dep, not a mokata dep)
        run: pip install pyyaml
      - name: Install jsonschema (present matrix leg only)
        if: matrix.jsonschema == 'present'
        run: pip install "jsonschema>=4.0"
      - name: Ensure jsonschema absent (absent matrix leg)
        if: matrix.jsonschema == 'absent'
        run: pip uninstall -y jsonschema || true
      - name: Byte-compile
        run: python -m compileall -q src
      - name: Run unit test suite
        run: python -m unittest discover -s tests -t tests
      - name: Run integration suite (the release gate)
        run: python -m unittest discover -s tests/integration -t tests/integration
      - name: Playbook smoke run (fresh init)
        run: |
          tmp="$(mktemp -d)"
          mokata init --profile standard --yes --path "$tmp"
          mokata playbook --path "$tmp"

  live-db:
    name: live-db (postgres + pgvector + neo4j)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16    # ships the pgvector extension
        env:
          POSTGRES_USER: mokata
          POSTGRES_PASSWORD: mokata
          POSTGRES_DB: mokata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mokata -d mokata_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/mokatatest1
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p mokatatest1 'RETURN 1'"
          --health-interval 10s --health-timeout 10s --health-retries 20
          --health-start-period 30s
    env:
      MOKATA_LIVE_DB: "1"
      # Password-less DSN + PGPASSWORD (libpq) — no inline credential in the workflow.
      MOKATA_PG_DSN: "postgresql://mokata@localhost:5432/mokata_test"
      PGPASSWORD: "mokata"
      NEO4J_URI: "bolt://localhost:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: mokatatest1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # Live extras (optional drivers) installed ONLY here — the core stays dependency-free.
      # pgvector needs no Python client: the backend uses psycopg + the DB extension.
      - name: Install mokata + live DB extras
        run: pip install -e ".[postgres,neo4j]"
      - name: Run the live-DB integration legs (required)
        run: >-
          python -m unittest discover -s tests/integration -t tests/integration
          -p "test_live_db.py" -v
