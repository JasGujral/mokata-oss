name: Scorecard supply-chain security

# OpenSSF Scorecard — supply-chain posture (branch protection, pinned deps, token
# permissions, …). Runs on the PUBLIC mirror only (it publishes results to the public
# OpenSSF API); on the private dev mirror the job is skipped, so this is a no-op there.

on:
  branch_protection_rule:
  schedule:
    - cron: "32 4 * * 2"   # 04:32 UTC every Tuesday
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.repository == 'JasGujral/mokata-oss'
    permissions:
      contents: read           # checkout + Scorecard read of repo metadata (job perms replace
                               # the top-level read-all, so it must be re-declared explicitly)
      security-events: write   # upload the SARIF results
      id-token: write          # publish results to the OpenSSF API
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@ff5dd8929f96a8a4dc67d13f32b8c75057829621 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          sarif_file: results.sarif
