name: CodeQL

# Static analysis for the Python source: on every push/PR to master, plus a weekly
# scheduled scan so newly-disclosed query packs catch latent issues. Least-privilege:
# the workflow reads the repo and writes only security alerts.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "27 3 * * 1"   # 03:27 UTC every Monday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    # Code scanning is free on the PUBLIC mirror but needs paid GHAS on the private dev repo,
    # where the upload fails with "code scanning is not enabled". Gate to the public repo so
    # CodeQL only runs where it can succeed (matches ci.yml / release.yml / docs.yml).
    if: github.repository == 'JasGujral/mokata-oss'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          languages: python
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          category: "/language:python"
