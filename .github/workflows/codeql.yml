name: CodeQL

# Static analysis for the Python source: on every push/PR to master, plus a weekly
# scheduled scan so newly-disclosed query packs catch latent issues. Least-privilege:
# the workflow reads the repo and writes only security alerts.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "27 3 * * 1"   # 03:27 UTC every Monday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
