name: Docs

on:
  push:
    branches: [master, main]
    paths: ["docs/**", "mkdocs.yml", ".github/workflows/docs.yml"]
  release:
    types: [published]      # rebuild docs whenever a release is published (build verifies; deploy is gated below)
  workflow_dispatch:

# Least-privilege default: read-only workspace-wide. Pages/id-token are granted ONLY to the
# deploy job below (nothing workspace-wide gets write scopes).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build runs on EVERY trigger (branch push, release/tag, manual) so docs are always
  # verified with `mkdocs build --strict`. It uploads the Pages artifact for the deploy job.
  build:
    # Only the public repo has GitHub Pages enabled — skip on the private dev repo.
    if: github.repository == 'JasGujral/mokata-oss'
    runs-on: ubuntu-latest
    permissions:
      contents: read        # checkout + build only; no write scopes for the build job
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - run: mkdocs build --strict
      # Auto-generate the Complete Guide PDF from its markdown (single source -> no drift)
      # into the built site, so the in-page "Download PDF" link always matches the page.
      # Best-effort + pinned tools: if pandoc/wkhtmltopdf are unavailable or rendering
      # fails, the step is skipped (continue-on-error) and the site still deploys.
      - name: Generate the Complete Guide PDF (best-effort)
        continue-on-error: true
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc wkhtmltopdf
          mkdir -p site/assets
          pandoc docs/tutorials/mokata-complete-guide.md \
            -o site/assets/mokata-complete-guide.pdf \
            --pdf-engine=wkhtmltopdf \
            --metadata title="mokata — The Complete Guide" \
            --toc -V toc-title="Contents"
          test -s site/assets/mokata-complete-guide.pdf && echo "PDF generated."
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  # Deploy is gated to the default branch ONLY (refs/heads/main). The github-pages
  # environment is protected to `main`, so a deploy from a tag/release ref is rejected —
  # that was the benign red at the 0.0.4 cut ("tag not allowed to deploy to github-pages").
  # Keeping the build above on every trigger preserves docs verification; only the deploy
  # is restricted (Stage 61b — release-process hardening).
  deploy:
    needs: build
    if: github.repository == 'JasGujral/mokata-oss' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write          # deploy to GitHub Pages (scoped to THIS job only)
      id-token: write        # OIDC for the Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
