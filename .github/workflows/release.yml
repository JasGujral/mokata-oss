name: release

# Continuous delivery: triggered by pushing a version tag (e.g. v1.0.0).
# Gates on the full test matrix, enforces version/manifest consistency, then publishes a
# GitHub Release. The Claude Code marketplace itself is PULL/SYNC-based — there is no API
# to "push" a plugin to it: the custom marketplace serves .claude-plugin/marketplace.json
# straight from this repo, and the community marketplace (once listed via
# clau.de/plugin-directory-submission) auto-syncs from this repo on each push. So keeping
# the repo + tags correct IS the publish; this pipeline guarantees they're correct.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
        jsonschema: ["absent", "present"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (jsonschema per matrix leg)
        run: |
          python -m pip install -e .
          if [ "${{ matrix.jsonschema }}" = "present" ]; then python -m pip install "jsonschema>=4"; fi
      - name: Unit test suite (must pass with jsonschema absent AND present)
        run: python -m unittest discover -s tests -t tests
      - name: Integration suite — REQUIRED release gate (jsonschema absent AND present)
        run: python -m unittest discover -s tests/integration -t tests/integration

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Version consistency (tag == pyproject == plugin == marketplace) + manifest validation
        run: |
          python - <<'PY'
          import json, re, os, sys
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          pv = re.search(r'version\s*=\s*"([^"]+)"', open("pyproject.toml").read()).group(1)
          plugin = json.load(open(".claude-plugin/plugin.json"))
          mkt = json.load(open(".claude-plugin/marketplace.json"))
          checks = {
              "pyproject": pv,
              "plugin.json": plugin["version"],
              "marketplace.metadata": mkt["metadata"]["version"],
              "marketplace.plugin": mkt["plugins"][0]["version"],
          }
          errs = [f"{k} version {v} != tag {tag}" for k, v in checks.items() if v != tag]
          sys.path.insert(0, "src")
          from mokata.packaging import validate_plugin, validate_marketplace
          errs += [f"plugin.json: {e}" for e in validate_plugin(plugin)]
          errs += [f"marketplace.json: {e}" for e in validate_marketplace(mkt)]
          if errs:
              print("\n".join(errs)); sys.exit(1)
          print(f"OK — version {tag} consistent across all manifests; plugin + marketplace valid")
          PY

  github-release:
    needs: [test, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract this version's CHANGELOG section
        run: |
          v="${GITHUB_REF_NAME#v}"
          awk -v ver="$v" '
            $0 ~ "^## \\[" ver "\\]" {f=1; next}
            /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true

  # ---------------------------------------------------------------------------------------
  # OPTIONAL — publish the `mokata` CLI to PyPI on release (so `pip install mokata` works).
  # Requires a PyPI project + Trusted Publishing (OIDC) configured for this repo, OR a
  # PYPI_API_TOKEN secret. Left disabled until you decide to ship to PyPI.
  # ---------------------------------------------------------------------------------------
