name: release

# Continuous delivery: triggered by pushing a version tag (e.g. v1.0.0).
# Gates on the full test matrix, enforces version/manifest consistency, then publishes a
# GitHub Release. The Claude Code marketplace itself is PULL/SYNC-based — there is no API
# to "push" a plugin to it: the custom marketplace serves .claude-plugin/marketplace.json
# straight from this repo, and the community marketplace (once listed via
# clau.de/plugin-directory-submission) auto-syncs from this repo on each push. So keeping
# the repo + tags correct IS the publish; this pipeline guarantees they're correct.

on:
  push:
    tags: ["v*"]

# Least-privilege default: read-only for every job. Jobs elevate ONLY what they need —
# `build` adds the scoped id-token/attestations for Sigstore provenance; `github-release`
# adds contents:write to publish. Nothing is granted workspace-wide.
permissions:
  contents: read

jobs:
  test:
    if: github.repository == 'JasGujral/mokata-oss'   # releases only from the public repo
    runs-on: ubuntu-latest
    permissions:
      contents: read        # checkout only (explicit least-privilege, not the inherited default)
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
        jsonschema: ["absent", "present"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install (jsonschema per matrix leg)
        run: |
          python -m pip install -e .
          python -m pip install pyyaml   # test-only dep for the workflow-lint tests (not a mokata dep)
          if [ "${{ matrix.jsonschema }}" = "present" ]; then python -m pip install "jsonschema>=4"; fi
      - name: Unit test suite (must pass with jsonschema absent AND present)
        run: python -m unittest discover -s tests -t tests
      - name: Integration suite — REQUIRED release gate (jsonschema absent AND present)
        run: python -m unittest discover -s tests/integration -t tests/integration

  validate:
    if: github.repository == 'JasGujral/mokata-oss'
    runs-on: ubuntu-latest
    permissions:
      contents: read        # checkout only (explicit least-privilege)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Version consistency (tag == pyproject == plugin == marketplace) + manifest validation
        run: |
          python - <<'PY'
          import json, re, os, sys
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          pv = re.search(r'version\s*=\s*"([^"]+)"', open("pyproject.toml").read()).group(1)
          plugin = json.load(open(".claude-plugin/plugin.json"))
          mkt = json.load(open(".claude-plugin/marketplace.json"))
          checks = {
              "pyproject": pv,
              "plugin.json": plugin["version"],
              "marketplace.metadata": mkt["metadata"]["version"],
              "marketplace.plugin": mkt["plugins"][0]["version"],
          }
          errs = [f"{k} version {v} != tag {tag}" for k, v in checks.items() if v != tag]
          sys.path.insert(0, "src")
          from mokata.packaging import validate_plugin, validate_marketplace
          errs += [f"plugin.json: {e}" for e in validate_plugin(plugin)]
          errs += [f"marketplace.json: {e}" for e in validate_marketplace(mkt)]
          if errs:
              print("\n".join(errs)); sys.exit(1)
          print(f"OK — version {tag} consistent across all manifests; plugin + marketplace valid")
          PY

  # Supply-chain trust (Stage 68): build a REPRODUCIBLE sdist+wheel, emit a CycloneDX SBOM,
  # and produce a Sigstore-backed BUILD-PROVENANCE attestation. All of this runs at TAG TIME
  # in CI (when the user cuts the release) — the repo itself ships no pre-signed artifacts.
  build:
    needs: [test, validate]
    if: github.repository == 'JasGujral/mokata-oss'
    runs-on: ubuntu-latest
    permissions:
      contents: read         # checkout only
      id-token: write        # Sigstore OIDC for the provenance attestation (scoped to THIS job)
      attestations: write    # store the build-provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install build + SBOM tooling (pinned)
        # `build` (PyPA) for sdist/wheel; `cyclonedx-bom` (the CycloneDX Python project, ships
        # the `cyclonedx-py` CLI) for the SBOM. Pinned so the release toolchain is reproducible.
        run: python -m pip install "build==1.2.1" "cyclonedx-bom==6.1.1"
      - name: Reproducible-build check (build twice → byte-identical)
        # SOURCE_DATE_EPOCH from the tag commit makes the build deterministic; the script builds
        # twice and fails closed on any sha256 mismatch.
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          bash scripts/check-reproducible.sh
      - name: Build the release artifacts (deterministic)
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python -m build --outdir dist .
          # Normalize the sdist so the RELEASED artifact matches the reproducible-build check
          # (metadata-only; contents untouched). The wheel is already reproducible.
          python scripts/normalize_sdist.py dist/*.tar.gz
          ls -l dist
      - name: Generate the CycloneDX SBOM
        # Scope the SBOM to a clean venv that has ONLY the built wheel installed, so it describes
        # the published package (mokata has no required runtime deps) + the install baseline.
        run: |
          python -m venv /tmp/sbomenv
          /tmp/sbomenv/bin/python -m pip install --upgrade pip >/dev/null
          /tmp/sbomenv/bin/python -m pip install dist/*.whl >/dev/null
          cyclonedx-py environment /tmp/sbomenv/bin/python \
            --output-format JSON --outfile sbom.cdx.json
          echo "SBOM written:"; head -c 400 sbom.cdx.json; echo
      - name: Attest build provenance (Sigstore) for the artifacts + SBOM
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/*
            sbom.cdx.json
      - name: Upload artifacts for the release job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mokata-dist
          path: |
            dist/*
            sbom.cdx.json

  github-release:
    needs: [build]
    if: github.repository == 'JasGujral/mokata-oss'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # publish the GitHub Release (scoped to THIS job)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Download the built artifacts + SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mokata-dist
          path: dist
      - name: Extract this version's CHANGELOG section
        run: |
          v="${GITHUB_REF_NAME#v}"
          awk -v ver="$v" '
            $0 ~ "^## \\[" ver "\\]" {f=1; next}
            /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
      - name: Create GitHub Release (attach signed artifacts + SBOM)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cdx.json

  # ---------------------------------------------------------------------------------------
  # OPTIONAL — publish the `mokata` CLI to PyPI on release (so `pip install mokata` works).
  # Requires a PyPI project + Trusted Publishing (OIDC) configured for this repo, OR a
  # PYPI_API_TOKEN secret. Left disabled until you decide to ship to PyPI.
